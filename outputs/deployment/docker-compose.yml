# ============================================================================
# TechNova Platform — Docker Compose
# Services: backend, frontend, postgres, redis
# Usage:  docker compose up -d
#         docker compose --profile monitoring up -d   (with monitoring)
# ============================================================================

version: "3.9"

services:
  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: technova-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-technova}
      POSTGRES_USER: ${DB_USER:-technova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-technova_user} -d ${DB_NAME:-technova}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - technova-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: technova-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-change_me_in_production}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - technova-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------- Backend API ----------
  backend:
    build:
      context: ../../outputs/code/backend
      dockerfile: ../../../outputs/deployment/Dockerfile.backend
    container_name: technova-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-technova}
      DB_USER: ${DB_USER:-technova_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_SSL: ${DB_SSL:-false}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_in_production}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      TOTP_ISSUER: ${TOTP_ISSUER:-TechNova Platform}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-10}
      ACCOUNT_LOCKOUT_THRESHOLD: ${ACCOUNT_LOCKOUT_THRESHOLD:-5}
      ACCOUNT_LOCKOUT_DURATION_MS: ${ACCOUNT_LOCKOUT_DURATION_MS:-900000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - technova-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------- Frontend (Nginx) ----------
  frontend:
    build:
      context: ../../outputs/code/frontend
      dockerfile: ../../../outputs/deployment/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
        VITE_APP_NAME: ${VITE_APP_NAME:-TechNova Platform}
    container_name: technova-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - technova-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ---------- Volumes ----------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------- Networks ----------
networks:
  technova-network:
    driver: bridge
    name: technova-network
