# SDLC Automation Pipeline Configuration
# This file defines the entire pipeline: agents, order, parameters, and preferences.
# Use this for reproducible, version-controlled pipeline runs.
#
# Usage: "Run the pipeline using sdlc-pipeline.yml configuration"

pipeline:
  name: "SDLC Automation Pipeline"
  version: "2.0"
  description: "End-to-end SDLC automation from meeting transcript to deployment"

# Input configuration
input:
  transcripts:
    - path: "inputs/transcript.txt"
    # For multi-transcript merger, add more:
    # - path: "inputs/followup_meeting.txt"
    #   priority: 2  # Higher = takes precedence on conflicts
  source: "local"  # Options: local, zoom, teams, google_meet, otter_ai, audio_file

# Execution mode
execution:
  mode: "interactive"  # Options: interactive, express, replay
  parallel_groups:  # DAG-based parallel execution
    phase_1_analysis:
      agents: [transcript_agent, environment_agent]
      parallel: true
    phase_2_requirements:
      agents: [requirement_agent]
      depends_on: [phase_1_analysis]
    phase_3_documentation:
      agents: [documentation_agent, planning_agent]
      parallel: true
      depends_on: [phase_2_requirements]
    phase_4_design:
      agents: [jira_agent, architecture_agent]
      parallel: true
      depends_on: [phase_3_documentation]
    phase_5_security:  # Shift-left security — runs before code is written
      agents: [security_threat_model_agent]
      depends_on: [phase_4_design]
      optional: true
      enabled: true   # OWASP top 10 + STRIDE threat model before code agent
    phase_6_implementation:
      agents: [code_agent]
      depends_on: [phase_4_design, phase_5_security]
    phase_7_quality:
      agents: [testing_agent, compliance_checker_agent]
      parallel: true
      depends_on: [phase_6_implementation]
      optional_agents: [compliance_checker_agent]
    phase_8_deployment:
      agents: [deployment_agent]
      depends_on: [phase_7_quality]
    phase_9_delivery:
      agents: [summary_agent, cost_estimation_agent, feedback_loop_agent]
      parallel: false  # Summary first, then cost, then feedback
      depends_on: [phase_8_deployment]
      optional_agents: [cost_estimation_agent]

# Pre-loaded user preferences (for replay mode)
user_preferences:
  ticketing_platform: "file_based"  # jira_cloud, github_issues, azure_devops, linear, file_based
  ticketing_credentials:
    # jira_base_url: ""
    # jira_api_token: ""
    # jira_project_key: ""
  database_engine: "sqlite"  # postgresql, mysql, sqlite, mongodb
  deployment_platform: "docker_compose"  # docker_compose, kubernetes, manual_scripts
  ci_cd_platform: "github_actions"  # github_actions, gitlab_ci, jenkins, azure_pipelines, none
  cloud_provider: "none"  # aws, azure, gcp, none
  documentation_platform: "local"  # local, confluence, notion, sharepoint
  install_tools_when_missing: true
  interactive_mode: true

# Optional agents toggle
optional_agents:
  security_threat_model: true   # Shift-left: threat model before code generation
  compliance_checker: true      # Auto-enable for regulated domains
  cost_estimation: true         # Stakeholders always ask "what will this cost?"
  feedback_loop: true

# Notification configuration
# To enable: set enabled: true and fill in at least one webhook_url below.
# The notification_dispatcher hook fires on every agent_completed event.
# If no webhook is configured, falls back to a macOS desktop notification.
notifications:
  enabled: true
  channels:
    slack:
      webhook_url: ""          # Paste your Slack Incoming Webhook URL here
      channel: "#sdlc-pipeline"
      notify_on: [agent_completed, pipeline_completed, error_occurred, retry_triggered]
    teams:
      webhook_url: ""          # Paste your MS Teams Incoming Webhook URL here
      notify_on: [pipeline_completed, error_occurred]
    # email:
    #   smtp_server: ""
    #   recipients: []
  fallback: "desktop"          # "desktop" = macOS osascript notification; "log" = log only
  events:
    - agent_completed
    - pipeline_completed
    - error_occurred
    - retry_triggered          # Fires when testing loop retries code agent
    - deployment_live          # Fires when a live URL is available after docker deploy

# Analytics
analytics:
  enabled: true
  track_token_usage: true
  track_execution_time: true
  output_file: "outputs/analytics/pipeline_metrics.json"

# Quality gates
quality_gates:
  code_quality_minimum_score: 70
  test_coverage_minimum: 60
  vulnerability_max_critical: 0
  vulnerability_max_high: 3

# Cyclic auto-fix loop (Testing Agent → Code Agent)
# If tests fail, the pipeline retries by sending failed_tests.json back to the
# code agent. The loop stops when tests pass or max_retries is reached.
testing_retry_loop:
  enabled: true
  max_retries: 3               # After 3 failures, escalate to user instead of retrying
  retry_contract: "outputs/qa/failed_tests.json"
  retry_state_file: "outputs/qa/retry_state.json"
  escalation_action: "pause"   # "pause" = ask user | "fail" = hard stop pipeline

# Live deployment execution (Deployment Agent)
# If docker_auto_deploy is true and Docker is available, the deployment agent will
# run `docker compose up` and write a live URL to deployment_output.json.
live_deployment:
  docker_auto_deploy: false    # Set true to spin up containers automatically
  health_check_timeout_seconds: 30
  staging_url_template: "http://localhost:{port}"
  output_url_field: "live_staging_url"  # Written to deployment_output.json
